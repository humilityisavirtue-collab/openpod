name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest hatchling
          pip install -e ".[crypto]" 2>/dev/null || pip install -e . || true

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify CLI entrypoint
        run: python -m openpod --help 2>/dev/null || python -c "from openpod.router import KlawRouter; r = KlawRouter(); print('router OK')"
